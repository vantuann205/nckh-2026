<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Traffic Monitor | Streaming Pipeline</title>
    <meta name="description"
        content="Realtime Traffic Monitoring Dashboard — Kafka → Redis → WebSocket pipeline for Ho Chi Minh City traffic analysis." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i data-lucide="radio" stroke-width="3"></i></div>
            <div>
                <div class="brand-title">TrafficStream</div>
                <div class="brand-sub">Realtime Pipeline</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-group-label">Tổng quan</div>
            <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard',this)">
                <i class="nav-icon" data-lucide="layout-dashboard"></i><span>Bảng điều khiển</span>
            </a>
            <a href="#" class="nav-item" data-page="map" onclick="navigate('map',this)">
                <i class="nav-icon" data-lucide="map"></i><span>Bản đồ giao thông</span>
            </a>

            <div class="nav-group-label">Dữ liệu</div>
            <a href="#" class="nav-item" data-page="explorer" onclick="navigate('explorer',this)">
                <i class="nav-icon" data-lucide="search"></i><span>Tra cứu dữ liệu</span>
            </a>
            <a href="#" class="nav-item" data-page="vehicle" onclick="navigate('vehicle',this)">
                <i class="nav-icon" data-lucide="car"></i><span>Mật độ xe</span>
            </a>

            <div class="nav-group-label">Vận hành</div>
            <a href="#" class="nav-item" data-page="alerts" onclick="navigate('alerts',this)">
                <i class="nav-icon" data-lucide="alert-triangle"></i><span>Cảnh báo tắc nghẽn</span>
                <span class="nav-badge" id="nav-alert-count">0</span>
            </a>

            <div class="nav-group-label">Hệ thống</div>
            <a href="#" class="nav-item" data-page="monitor" onclick="navigate('monitor',this)">
                <i class="nav-icon" data-lucide="activity"></i><span>Giám sát Pipeline</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="pipeline-status">
                <div class="pipeline-label">Pipeline Status</div>
                <div class="pipeline-flow">
                    <span class="pipe-node kafka">Kafka</span>
                    <span class="pipe-arrow">→</span>
                    <span class="pipe-node consumer">Consumer</span>
                    <span class="pipe-arrow">→</span>
                    <span class="pipe-node redis">Redis</span>
                    <span class="pipe-arrow">→</span>
                    <span class="pipe-node ws">WS</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
        <!-- HEADER -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <div class="breadcrumbs">
                    <i data-lucide="home"></i>
                    <span>Bảng điều khiển / Giao thông</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="topbar-actions">
                    <div class="stream-indicator" id="stream-indicator">
                        <span class="stream-dot"></span>
                        <span class="stream-text">Streaming</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <main class="content" id="content">
            <!-- Pages injected by JS -->
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="data.js"></script>
    <script type="module" src="pages.js"></script>
    <script type="module" src="charts.js"></script>
    <script type="module" src="map.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
