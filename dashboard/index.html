<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Traffic Monitor | Streaming Pipeline</title>
    <meta name="description"
        content="Realtime Traffic Monitoring Dashboard — Kafka → Redis → WebSocket pipeline for Ho Chi Minh City traffic analysis." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />

    <!-- Dark Mode Inline Script to prevent flash -->
    <script>
        const theme = localStorage.getItem("theme");
        if (theme === "dark" || !theme) document.body.classList.add("dark");
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <!-- Street coordinates lookup table -->
    <script src="street_coords.js"></script>
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet.heat plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Prediction Module -->
    <script src="prediction.js" defer></script>
    <style>
      @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideUp   { from { transform: translateY(0);    opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }
      @keyframes spin      { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
        <!-- TOP NAVIGATION BAR -->
        <header class="topbar">
            <!-- Brand -->
            <div class="topbar-brand">
                <div class="brand-icon">
                    <div class="stack-logo">
                        <div class="layer layer1"></div>
                        <div class="layer layer2"></div>
                        <div class="layer layer3"></div>
                        <div class="layer layer4"></div>
                    </div>
                </div>
                <div>
                    <div class="brand-title">TrafficStream</div>
                    <div class="brand-sub">Realtime Pipeline</div>
                </div>
            </div>

            <!-- Main Navigation Links -->
            <nav class="topbar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard',this)">Tổng quan</a>
                <a href="#" class="nav-item" data-page="map" onclick="navigate('map',this)">Bản đồ</a>
                <a href="#" class="nav-item" data-page="vehicle" onclick="navigate('vehicle',this)">Mật độ xe</a>
                <a href="#" class="nav-item" data-page="explorer" onclick="navigate('explorer',this)">Tra cứu</a>
                <a href="#" class="nav-item" data-page="alerts" onclick="navigate('alerts',this)">
                    Cảnh báo <span class="nav-badge" id="nav-alert-count" style="display:none">0</span>
                </a>
                <a href="#" class="nav-item" data-page="accidents" onclick="navigate('accidents',this)">Tai nạn</a>
                <a href="#" class="nav-item" data-page="weather" onclick="navigate('weather',this)">Thời tiết</a>
                <a href="#" class="nav-item" data-page="prediction" onclick="navigate('prediction',this)">🔮 Dự đoán</a>
                <a href="#" class="nav-item" data-page="monitor" onclick="navigate('monitor',this)">Giám sát</a>
            </nav>

            <!-- Actions / Status -->
            <div class="topbar-right">
                <div class="header-filters">
                    <select id="time-filter" onchange="window.updateFilters && window.updateFilters()">
                        <option value="1h">Last 1h</option>
                        <option value="6h">Last 6h</option>
                        <option value="24h">Last 24h</option>
                    </select>
                </div>
                <div class="topbar-actions">
                    <div class="status-indicator disconnected" id="api-status">
                        <span class="status-dot"></span>
                        <span class="status-text">🔴 Disconnected</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- LOADING PROGRESS BAR -->
        <div id="loading-progress-container" class="loading-progress-hidden">
            <div class="loading-progress-bar">
                <div class="loading-progress-content">
                    <div class="loading-progress-left">
                        <span class="loading-progress-label">Đang tải dữ liệu...</span>
                        <div class="loading-progress-details">
                            <span id="loading-vehicles-count">0</span> xe | 
                            <span id="loading-vehicles-speed">0</span> xe/giây | 
                            ~<span id="loading-eta">?</span>s còn lại
                        </div>
                    </div>
                    <div class="loading-progress-bar-bg">
                        <div id="loading-progress-fill" class="loading-progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <main class="content" id="content">
            <!-- Pages injected by JS -->
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="data.js"></script>
    <script type="module" src="pages.js"></script>
    <script type="module" src="charts.js"></script>
    <script src="map.js" defer></script>
    <script type="module" src="weather-accidents.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
